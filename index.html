<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lucky Spin Admin Login</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-box">

<img
src="assets/logo/logo.png"
class="logo">

<h1>LUCKY SPIN</h1>

<p>ADMIN PANEL</p>

<form id="loginForm">

<div class="input-group">

<label>Username</label>

<input
type="text"
id="username"
placeholder="Masukkan Username">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Masukkan Password">

</div>

<button>

LOGIN

</button>

</form>

</div>

<script src="js/login.js"></script>

</body>

</html>
